<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Lex Rubin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #f0ede8;
      --gray: #aaa;
      --border: rgba(255,255,255,0.1);
      --accent: #c8b89a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 110px;
      background: var(--black);
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.5s ease forwards;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { position: relative; display: flex; }
    #logo-default, #logo-hover { transition: opacity 0.3s ease; }
    #logo-hover { position: absolute; top: 0; left: 0; }

    .nav-links { display: flex; gap: 2.5rem; }
    .nav-links a {
      text-decoration: none;
      color: #444;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: #aaa;
      transition: width 0.3s ease;
    }
    .nav-links a:hover { color: #aaa; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: #aaa; }
    .nav-links a.active::after { width: 100%; background: #aaa; }

    /* ── PAGE WRAPPER ── */
    .page-wrapper {
      padding: 0 4rem;
    }

    .content-col {
      max-width: 900px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem 20rem;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      animation: fadeIn 0.6s ease 0.1s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .contact-container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .contact-heading {
      font-family: 'Inter', sans-serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }

    .contact-sub {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      letter-spacing: 0.16em;
      line-height: 1.7;
      margin-bottom: 2.8rem;
    }

    .contact-sub a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-sub a:hover { color: #bbb; }

    /* ── FORM ── */
    .contact-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      padding: 0.9rem 1.1rem;
      outline: none;
      transition: border-color 0.25s;
      letter-spacing: 0.03em;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: #555;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #666;
    }

    .contact-form input.invalid,
    .contact-form textarea.invalid {
      border-color: #a05050;
    }

    .contact-form input.valid,
    .contact-form textarea.valid {
      border-color: #7aaa88;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 160px;
    }

    .contact-form button {
      align-self: flex-start;
      background: #333;
      color: #bbb;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      cursor: none;
      transition: background 0.25s, color 0.25s;
    }

    .contact-form button:hover {
      background: #444;
      color: #ddd;
    }

    /* ── FOOTER ── */
    footer {
      background: #000000;
      padding: 0;
      position: relative;
      text-align: center;
    }

    .footer-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 0 3.5rem;
      max-width: 900px;
      margin: 0 auto;
      gap: 1.4rem;
    }

    .footer-reached {
      font-style: italic;
      font-size: 1rem;
      color: #444;
      letter-spacing: 0.90em;
      word-spacing: 1.3em;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 4rem;
      font-size: 0.85rem;
      color: #444;
      letter-spacing: 0.1em;
      word-spacing: 0.7em;
    }

    .footer-bottom span {
      font-style: normal;
    }

    .footer-bottom a {
      color: #444;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-style: normal;
      letter-spacing: 0.1em;
      word-spacing: 0.7em;
      transition: color 0.2s;
    }
    .footer-bottom a:hover { color: #888; }

    .footer-scroll-btn { display: none; }

    /* ── CUSTOM CURSOR ── */
    body, * { cursor: none !important; }

    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      filter: grayscale(1);
      transition: width 0.35s cubic-bezier(0.16,1,0.3,1),
                  height 0.35s cubic-bezier(0.16,1,0.3,1),
                  border-radius 0.35s, background 0.2s;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid #fff;
      pointer-events: none;
      z-index: 9997;
      transform: translate(-50%, -50%);
      opacity: 0.8;
      mix-blend-mode: difference;
      filter: grayscale(1);
      transition: width 0.4s cubic-bezier(0.16,1,0.3,1),
                  height 0.4s cubic-bezier(0.16,1,0.3,1),
                  border-radius 0.4s, opacity 0.2s, border-width 0.2s;
    }
    .cursor.clicking { transform: translate(-50%, -50%) scale(0.6); }
  </style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="ring0"></div>

<!-- NAV -->
<nav>
  <a href="/index.html" class="logo" id="logo-link" style="position:relative;display:inline-block;width:108px;height:108px;">
    <svg id="logo-default" style="display:block;" width="108" height="108" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 593.83 593.83">

</svg>
    <svg id="logo-hover" style="display:none;" width="108" height="108" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 593.83 593.83">
  <defs><style>.lh-cls-1{stroke-width:13px;}.lh-cls-1,.lh-cls-2{fill:#fff;stroke:#fff;stroke-miterlimit:10;}.lh-cls-3{fill:none;stroke:#231f20;stroke-linecap:round;stroke-linejoin:round;stroke-width:6px;}.lh-cls-2{stroke-width:18px;}</style></defs>

  <path class="lh-cls-3" d="M206.75,475.23h181.4c18.39,0,33.3-12.59,33.3-28.12v-131.17c0-15.53-14.91-28.12-33.3-28.12h-181.4c-18.39,0-33.3,12.59-33.3,28.12v131.17c0,15.53,14.91,28.12,33.3,28.12Z"/>

  <polyline class="lh-cls-3" points="294.81 475.23 294.81 415.36 294.81 358.84 338.95 358.84"/>

  </a>
  <div class="nav-links">
    <a href="/index.html">Portfolio</a>
    <a href="/about/about.html">About</a>
    <a href="/contact/contact.html" class="active">Contact</a>
    <a href="https://lexrubin-git.github.io/Resume.pdf" target="_blank">Resume</a>
  </div>
</nav>

<!-- MAIN -->
<div class="page-wrapper">
<main>
  <div class="content-col">
  <div class="contact-container">
    <h1 class="contact-heading">Let's work together!</h1>
    <p class="contact-sub">
      send me a message below, or<br>
      just email me at <a href="mailto:lexrubin@gmail.com">lexrubin@gmail.com</a>
    </p>

    <div class="contact-form" id="contact-form">
      <input type="text" id="field-name" placeholder="Name" />
      <input type="email" id="field-email" placeholder="*Email Address" required />
      <textarea id="field-message" placeholder="*Leave your message here :)" required></textarea>
      <button type="button" id="submit-btn" onclick="submitForm()">Submit</button>
      <p id="form-status" style="font-size:0.82rem;letter-spacing:0.14em;margin-top:0.25rem;display:none;"></p>
    </div>
  </div>
  </div><!-- /content-col -->
</main>
</div><!-- /page-wrapper -->

<!-- FOOTER -->
<footer>
  <div style="border-top: 1px solid rgba(255,255,255,0.1);"></div>
  <div class="footer-bottom">
    <div class="footer-reached">You've reached the bottom</div>
    <div class="footer-links">
      <span>© 2026 Lex Rubin</span>
      <a href="https://www.linkedin.com/in/lex-rubin-21093a306/" target="_blank">LinkedIn</a>
      <a href="/index.html">Home Page</a>
      <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'}); return false;">Back to Top</a>
    </div>
    <button class="footer-scroll-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⇕</button>
  </div>
</footer>

<script>
  function isValidEmail(val) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
  }

  function attachValidation(id) {
    const el = document.getElementById(id);
    function check() {
      const isEmail = id === 'field-email';
      const isName  = id === 'field-name';
      const ok = isEmail ? isValidEmail(el.value) : el.value.trim().length > 0;
      el.classList.toggle('valid', ok);
      el.classList.toggle('invalid', !ok && el.value.length > 0 && !isName);
      if (el.value.length === 0) el.classList.remove('invalid');
    }
    el.addEventListener('blur', () => {
      const isEmail = id === 'field-email';
      const isName  = id === 'field-name';
      const ok = isEmail ? isValidEmail(el.value) : el.value.trim().length > 0;
      el.classList.toggle('valid', ok);
      el.classList.toggle('invalid', !ok && !(isName && el.value.length === 0));
    });
    el.addEventListener('input', check);
  }

  attachValidation('field-name');
  attachValidation('field-email');
  attachValidation('field-message');

  async function submitForm() {
    const btn    = document.getElementById('submit-btn');
    const status = document.getElementById('form-status');
    const email  = document.getElementById('field-email').value.trim();
    const message = document.getElementById('field-message').value.trim();

    if (!email || !message) {
      status.style.display = 'block';
      status.style.color = '#a05050';
      status.textContent = 'Please fill in your email and message.';
      return;
    }

    btn.textContent = 'Sending...';
    btn.disabled = true;
    status.style.display = 'none';

    try {
      const res = await fetch('https://formspree.io/f/xjgagypd', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:    document.getElementById('field-name').value.trim(),
          email:   email,
          message: message
        })
      });

      if (res.ok) {
        btn.textContent = 'Sent';
        document.getElementById('field-name').value = '';
        document.getElementById('field-email').value = '';
        document.getElementById('field-message').value = '';
        status.style.display = 'block';
        status.style.color = '#7aaa88';
        status.textContent = "Message sent — I'll be in touch soon!";
      } else {
        throw new Error('Failed');
      }
    } catch (e) {
      btn.textContent = 'Submit';
      btn.disabled = false;
      status.style.display = 'block';
      status.style.color = '#a05050';
      status.textContent = 'Something went wrong. Please try again.';
    }
  }

  const cur  = document.getElementById('cur');
  const ring = document.getElementById('ring0');

  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function animCursor() {
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(animCursor);
  }
  animCursor();

  function setCursor(dotW, dotH, dotRadius, ringW, ringH, ringRadius, ringBorder) {
    cur.style.width        = dotW;
    cur.style.height       = dotH;
    cur.style.borderRadius = dotRadius;
    cur.style.background   = '#fff';
    ring.style.width       = ringW;
    ring.style.height      = ringH;
    ring.style.borderRadius = ringRadius;
    ring.style.borderWidth = ringBorder || '1.5px';
    ring.style.opacity     = '0.8';
  }

  function resetCursor() {
    setCursor('10px','10px','50%','36px','36px','50%','1.5px');
  }

  document.querySelectorAll('nav a').forEach(el => {
    el.addEventListener('mouseenter', () => setCursor('4px','4px','50%','52px','52px','50%','1px'));
    el.addEventListener('mouseleave', resetCursor);
  });

  document.querySelectorAll('h1, h2, h3, p, .contact-heading, .contact-sub').forEach(el => {
    el.addEventListener('mouseenter', () => setCursor('2px','20px','1px','14px','14px','50%','1px'));
    el.addEventListener('mouseleave', resetCursor);
  });

  document.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('mouseenter', () => setCursor('2px','20px','1px','14px','14px','50%','1px'));
    el.addEventListener('mouseleave', resetCursor);
  });

  document.querySelectorAll('button').forEach(el => {
    el.addEventListener('mouseenter', () => setCursor('6px','6px','50%','48px','48px','50%','1px'));
    el.addEventListener('mouseleave', resetCursor);
  });

  document.querySelectorAll('footer span, .footer-reached').forEach(el => {
    el.addEventListener('mouseenter', () => setCursor('2px','20px','1px','14px','14px','50%','1px'));
    el.addEventListener('mouseleave', resetCursor);
  });

  document.querySelectorAll('footer a').forEach(el => {
    el.addEventListener('mouseenter', () => setCursor('4px','4px','50%','44px','44px','50%','1px'));
    el.addEventListener('mouseleave', resetCursor);
  });

  document.addEventListener('mousedown', () => cur.classList.add('clicking'));
  document.addEventListener('mouseup',   () => cur.classList.remove('clicking'));

  // Logo hover swap
  const logoLink    = document.getElementById('logo-link');
  const logoDefault = document.getElementById('logo-default');
  const logoHover   = document.getElementById('logo-hover');
  logoHover.style.opacity = '0';
  logoDefault.style.opacity = '1';
  logoHover.style.display = 'block';
  logoLink.addEventListener('mouseenter', () => {
    logoDefault.style.opacity = '0';
    logoHover.style.opacity = '1';
  });
  logoLink.addEventListener('mouseleave', () => {
    logoDefault.style.opacity = '1';
    logoHover.style.opacity = '0';
  });
</script>
</body>
</html>
